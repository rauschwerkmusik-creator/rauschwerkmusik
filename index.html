<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAUSCHWERK</title>
<meta name="description" content="Rauschwerk – Dark Techno, Hard Techno und Industrial Techno. Hypnotischer Druck, dunkle Energie und industrieller Sound." />
<meta property="og:title" content="RAUSCHWERK – Dark / Industrial / Hard Techno" />
<meta property="og:description" content="Dark Techno, Industrial Techno und Hard Techno aus Deutschland. Hypnotische Energie, industrielle Klangwelten und kompromissloser Druck." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://rauschwerkmusik.de/" />
<meta property="og:image" content="https://rauschwerkmusik.de/banner.png" />
<link rel="icon" href="avatar.png" />
<style>
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 30%, rgba(59,130,246,.08), transparent 30%),radial-gradient(circle at 80% 70%, rgba(255,255,255,.04), transparent 25%);animation:drift 14s ease-in-out infinite alternate;pointer-events:none;z-index:0}
@keyframes drift{from{transform:translateY(0)}to{transform:translateY(-20px)}}
*{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:#05080d;color:#fff;overflow-x:hidden}
.hero{min-height:100vh;background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.88)),url('banner.png') center/cover no-repeat;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.hero-content,.section,footer{position:relative;z-index:1} h1{font-size:clamp(3rem,8vw,7rem);letter-spacing:.22em;margin:0}
.sub{color:#cbd5e1;letter-spacing:.3em;font-size:.9rem}.tag{color:#94a3b8;font-size:1.2rem;margin-top:20px}
.btn,.amuse-button{display:inline-block;margin-top:35px;padding:16px 30px;border:1px solid #60a5fa;color:white;text-decoration:none;border-radius:18px;transition:.3s}
.btn:hover,.amuse-button:hover{background:rgba(96,165,250,.15);transform:translateY(-2px)}
.section{padding:90px 20px;max-width:1200px;margin:auto}.about{display:grid;grid-template-columns:1fr 1.4fr;gap:50px;align-items:center}
.avatar{width:100%;max-width:420px;border-radius:50%;display:block;margin:auto;box-shadow:0 0 50px rgba(59,130,246,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}.card{padding:28px;background:#0f172a;border:1px solid #1e293b;border-radius:24px;text-align:center;text-decoration:none;color:#fff;font-size:1.2rem;transition:.3s}
.card:hover{transform:translateY(-4px);border-color:#60a5fa}.release{text-align:center}.cover{width:min(360px,80vw);border-radius:28px;box-shadow:0 0 50px rgba(0,0,0,.4)}
.amuse-cta{margin:40px auto 0;max-width:800px;padding:30px;background:linear-gradient(135deg,#111,#1c1c1c);border:1px solid rgba(255,255,255,.08);border-radius:24px;text-align:center;box-shadow:0 0 25px rgba(0,0,0,.5)}
.amuse-cta h3{text-transform:uppercase;letter-spacing:2px}.amuse-cta p{color:#cbd5e1}
footer{text-align:center;padding:70px 20px;border-top:1px solid #111827;color:#cbd5e1}
@media(max-width:850px){.about{grid-template-columns:1fr}h1{letter-spacing:.12em}.sub{letter-spacing:.15em}}
</style>
</head>

</html>
